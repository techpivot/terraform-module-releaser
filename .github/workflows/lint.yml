name: Lint Codebase

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  statuses: write # To report GitHub Actions status checks

jobs:
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci --no-fund

      - name: Lint TypeScript with Biome
        id: biome
        run: npm run check

  lint-codebase:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Codebase with Super-Linter
        id: super-linter
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: (dist/**/*)|(__tests__/fixtures/**/*)|package-lock\.json
          FIX_TYPESCRIPT_PRETTIER: false # Using biome
          FIX_JAVASCRIPT_PRETTIER: false # Using biome
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_BIOME_FORMAT: false # Super-Linter Biome runtime can lag project Biome config schema. When Super Linter > 8.6.0, likely remove this line to re-enable.
          VALIDATE_BIOME_LINT: false # Super-Linter Biome runtime can lag project Biome config schema. When Super Linter > 8.6.0, likely remove this line to re-enable.
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false # This is new. Will investigate this further
          VALIDATE_JAVASCRIPT_PRETTIER: false # Using biome
          VALIDATE_JAVASCRIPT_STANDARD: false # Using biome
          VALIDATE_JSON_PRETTIER: false # Using biome
          VALIDATE_JSCPD: false # Using biome
          VALIDATE_MARKDOWN: false # Not needed, using textlint and prettier
          VALIDATE_TERRAFORM_FMT: false # Terraform modules here aren't needed (They're for testing only)
          VALIDATE_TERRAFORM_TFLINT: false # Terraform modules here aren't needed (They're for testing only)
          VALIDATE_TYPESCRIPT_ES: false # Using biome
          VALIDATE_TYPESCRIPT_STANDARD: false # Using biome
          VALIDATE_TYPESCRIPT_PRETTIER: false # Using biome
